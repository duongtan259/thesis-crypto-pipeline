name: Deploy — Build & Push to Azure

on:
  push:
    branches: [main]
    paths:
      - "generator/**"
      - "docker/Dockerfile.generator"

  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  id-token: write   # required for OIDC token request
  contents: read

jobs:
  build-and-deploy:
    name: Build AMD64 image → ACR → ACI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC — no secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name thesiscryptoacr

      - name: Build and push AMD64 image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t thesiscryptoacr.azurecr.io/crypto-generator:latest \
            -t thesiscryptoacr.azurecr.io/crypto-generator:${{ github.sha }} \
            -f docker/Dockerfile.generator \
            . \
            --push

      - name: Deploy to Azure Container Instances
        run: |
          # Delete existing container group if present (idempotent redeploy)
          az container delete \
            --resource-group rg-thesis-fabric \
            --name crypto-generator \
            --yes 2>/dev/null || true

          az container create \
            --resource-group rg-thesis-fabric \
            --name crypto-generator \
            --image thesiscryptoacr.azurecr.io/crypto-generator:${{ github.sha }} \
            --registry-login-server thesiscryptoacr.azurecr.io \
            --registry-username thesiscryptoacr \
            --registry-password "$(az acr credential show --name thesiscryptoacr --query 'passwords[0].value' -o tsv)" \
            --os-type Linux \
            --environment-variables \
                USE_LOCAL_KAFKA=false \
                DATA_SOURCE=coinbase_ws \
                SYMBOLS="BTC-USD,ETH-USD,SOL-USD,BNB-USD,XRP-USD" \
                EVENTHUB_NAME=crypto-prices \
                BATCH_SIZE=50 \
            --secure-environment-variables \
                EVENTHUB_CONNECTION_STRING="${{ secrets.EVENTHUB_CONNECTION_STRING }}" \
            --cpu 1 --memory 1.5 \
            --restart-policy Always \
            --location westeurope

      - name: Verify deployment
        run: |
          echo "Waiting for container to start..."
          for i in $(seq 1 12); do
            STATE=$(az container show \
              --resource-group rg-thesis-fabric \
              --name crypto-generator \
              --query instanceView.state -o tsv 2>/dev/null || echo "unknown")
            echo "  [$i/12] Container state: $STATE"
            [ "$STATE" = "Running" ] && break
            [ "$i" = "12" ] && echo "ERROR: Container did not reach Running state" && exit 1
            sleep 10
          done
          echo ""
          echo "==> Container logs:"
          az container logs \
            --resource-group rg-thesis-fabric \
            --name crypto-generator \
            --tail 20
          echo ""
          echo "Deployment successful"
