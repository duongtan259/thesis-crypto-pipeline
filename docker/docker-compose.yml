version: "3.9"

# ─────────────────────────────────────────────────────────
# Crypto Price Streaming Pipeline — Local Dev Stack
#
# Profiles:
#   local   → Kafka + generator (no Azure needed)
#   azure   → generator only, publishing to Azure Event Hub
#
# Usage:
#   Local dev (no Azure):
#     docker compose --profile local up --build
#
#   Azure mode (after getting Event Hub connection string):
#     docker compose --profile azure up --build
# ─────────────────────────────────────────────────────────

services:

  # ── Local Kafka broker (offline dev only) ──────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    profiles: [local]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [local]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka UI — browse messages in browser at localhost:8080 ──
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: [local]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Generator in LOCAL mode (→ Kafka) ──────────────────
  generator-local:
    build:
      context: ..
      dockerfile: docker/Dockerfile.generator
    profiles: [local]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      USE_LOCAL_KAFKA: "true"
      KAFKA_BOOTSTRAP: "kafka:29092"
      KAFKA_TOPIC: "crypto-prices"
      DATA_SOURCE: "${DATA_SOURCE:-coinbase_ws}"
      SYMBOLS: "${SYMBOLS:-BTC-USD,ETH-USD,SOL-USD,BNB-USD,XRP-USD}"
      BATCH_SIZE: "${BATCH_SIZE:-50}"
      MAX_EVENTS_PER_SECOND: "${MAX_EVENTS_PER_SECOND:-0}"
    restart: unless-stopped

  # ── Generator in AZURE mode (→ Event Hub) ──────────────
  generator-azure:
    build:
      context: ..
      dockerfile: docker/Dockerfile.generator
    profiles: [azure]
    environment:
      USE_LOCAL_KAFKA: "false"
      EVENTHUB_CONNECTION_STRING: "${EVENTHUB_CONNECTION_STRING}"
      EVENTHUB_NAME: "${EVENTHUB_NAME:-crypto-prices}"
      DATA_SOURCE: "${DATA_SOURCE:-coinbase_ws}"
      SYMBOLS: "${SYMBOLS:-BTC-USD,ETH-USD,SOL-USD,BNB-USD,XRP-USD}"
      BATCH_SIZE: "${BATCH_SIZE:-50}"
      MAX_EVENTS_PER_SECOND: "${MAX_EVENTS_PER_SECOND:-0}"
    restart: unless-stopped
